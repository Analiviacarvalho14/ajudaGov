<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Doação</title>
    <link rel="stylesheet" href="../Css/detalheDoacao.css">
</head>
<body>

    <div id="toast-container"></div>

    <header class="header-detalhes">
        <div class="header-left">
            <img src="../IMG/logoAjudaGov.png" alt="Ajuda Gov" class="logo-ajuda-detalhe">
        </div>
        
        <div class="header-center-search">
            <span class="search-icon-detalhe">🔍</span>
            <input type="text" class="search-bar-detalhe" placeholder="Pesquisar ONG">
        </div>
        
        <div class="header-right">
            <span class="user-link-text">Entre na sua conta</span>
            <span class="user-avatar-icon">👤</span>
        </div>
    </header>

    <main class="main-container-detalhes">
        <h1 class="main-title-detalhes">APOIO E CONEXÃO PARA VOCÊ - DOAÇÕES</h1>

        <div class="cards-grid-detalhes">
            
            <div class="box-detalhe-item">
                <h2 class="box-item-title badge-categoria">Roupas</h2>
                
                <div class="box-item-row">
                    <div class="box-row-left">
                        <label for="tipo1">Tipo</label>
                        <div class="select-wrapper">
                            <select id="tipo1" class="custom-select">
                                <option value="" disabled selected>Selecione</option>
                            </select>
                            <span class="custom-arrow">⌵</span>
                        </div>
                    </div>
                    <button type="button" class="btn-add-item">+</button>
                </div>

                <div class="box-item-row">
                    <div class="box-row-left">
                        <label for="qtd1">Quantidade</label>
                        <div class="select-wrapper">
                            <select id="qtd1" class="custom-select">
                                <option value="" disabled selected>0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                            <span class="custom-arrow">⌵</span>
                        </div>
                    </div>
                    <button type="button" class="btn-add-item">+</button>
                </div>
            </div>

            <div class="box-detalhe-item">
                <h2 class="box-item-title badge-categoria">Roupas</h2>
                
                <div class="box-item-row">
                    <div class="box-row-left">
                        <label for="tipo2">Tipo</label>
                        <div class="select-wrapper">
                            <select id="tipo2" class="custom-select">
                                <option value="" disabled selected>Selecione</option>
                            </select>
                            <span class="custom-arrow">⌵</span>
                        </div>
                    </div>
                    <button type="button" class="btn-add-item">+</button>
                </div>

                <div class="box-item-row">
                    <div class="box-row-left">
                        <label for="qtd2">Quantidade</label>
                        <div class="select-wrapper">
                            <select id="qtd2" class="custom-select">
                                <option value="" disabled selected>0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                            <span class="custom-arrow">⌵</span>
                        </div>
                    </div>
                    <button type="button" class="btn-add-item">+</button>
                </div>
            </div>

        </div>
    </main>

    <script src="../JS/detalheDoacao.js"></script>
</body>
</html>
